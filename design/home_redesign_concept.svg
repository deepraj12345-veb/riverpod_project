<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Fresh grocery app home screen redesign concept">
  <defs>
    <linearGradient id="hero" x1="35" y1="104" x2="345" y2="252" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F8B4C"/>
      <stop offset="0.58" stop-color="#12A86B"/>
      <stop offset="1" stop-color="#F6B84B"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FAFBF7"/>
      <stop offset="0.52" stop-color="#F6F7F1"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#163523" flood-opacity="0.12"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1E3B2B" flood-opacity="0.10"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="0" y="0" width="390" height="844" rx="34"/>
    </clipPath>
  </defs>

  <rect width="390" height="844" rx="34" fill="url(#surface)"/>
  <g clip-path="url(#screenClip)">
    <rect x="0" y="0" width="390" height="844" fill="url(#surface)"/>

    <!-- Status bar -->
    <text x="28" y="30" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#17231B">9:41</text>
    <rect x="313" y="20" width="22" height="10" rx="3" fill="none" stroke="#17231B" stroke-width="1.4"/>
    <rect x="337" y="23" width="2" height="4" rx="1" fill="#17231B"/>
    <rect x="316" y="23" width="15" height="4" rx="2" fill="#17231B"/>

    <!-- Header -->
    <g transform="translate(22 54)">
      <circle cx="23" cy="23" r="23" fill="#EAF7EE"/>
      <path d="M14 25c7-15 18-15 25-6-2 12-13 18-25 12 7-1 13-5 17-12-8 3-13 7-17 6Z" fill="#159A52"/>
      <text x="60" y="17" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#687367">Delivering to</text>
      <text x="60" y="38" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#152017">Home, 12 min</text>
      <rect x="306" y="3" width="44" height="44" rx="16" fill="#FFFFFF" filter="url(#softShadow)"/>
      <path d="M328 17c-5 0-9 4-9 9v4l-3 5h24l-3-5v-4c0-5-4-9-9-9Zm-4 21a4 4 0 0 0 8 0" fill="none" stroke="#152017" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="337" cy="16" r="5" fill="#EF5948"/>
    </g>

    <!-- Search -->
    <g transform="translate(22 116)">
      <rect width="346" height="52" rx="18" fill="#FFFFFF" filter="url(#softShadow)"/>
      <circle cx="27" cy="26" r="8" fill="none" stroke="#1C2B20" stroke-width="2"/>
      <path d="m33 32 7 7" stroke="#1C2B20" stroke-width="2" stroke-linecap="round"/>
      <text x="54" y="32" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#798276">Search fruits, dairy, snacks</text>
      <rect x="296" y="9" width="34" height="34" rx="13" fill="#F2F5EA"/>
      <path d="M306 22h14M309 30h8M312 16h2M318 16h2" stroke="#159A52" stroke-width="2" stroke-linecap="round"/>
    </g>

    <!-- Hero -->
    <g transform="translate(22 188)" filter="url(#shadow)">
      <rect width="346" height="146" rx="24" fill="url(#hero)"/>
      <circle cx="286" cy="84" r="77" fill="#FFFFFF" opacity="0.13"/>
      <circle cx="325" cy="20" r="46" fill="#FFFFFF" opacity="0.08"/>
      <text x="22" y="34" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" letter-spacing="1.3" fill="#EAFBF0">FRESH TODAY</text>
      <text x="22" y="66" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900" fill="#FFFFFF">Seasonal picks</text>
      <text x="22" y="91" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="600" fill="#EAFBF0">Save up to 30% on farm produce</text>
      <rect x="22" y="108" width="108" height="30" rx="15" fill="#FFFFFF"/>
      <text x="46" y="128" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#118147">Shop now</text>

      <!-- Food illustration -->
      <ellipse cx="270" cy="96" rx="56" ry="23" fill="#0B5E36" opacity="0.22"/>
      <circle cx="252" cy="69" r="24" fill="#F05E4D"/>
      <path d="M244 47c9-10 19-9 28-2-12 2-20 6-28 2Z" fill="#1F8E4C"/>
      <ellipse cx="292" cy="78" rx="29" ry="21" fill="#F7C84D"/>
      <path d="M279 59c14-8 27-4 38 6-17-1-27 2-38-6Z" fill="#5AB66A"/>
      <rect x="223" y="87" width="47" height="39" rx="15" fill="#F6F1DF"/>
      <path d="M228 91c14 10 25 10 37 0" fill="none" stroke="#E6D6A5" stroke-width="4" stroke-linecap="round"/>
      <circle cx="312" cy="108" r="17" fill="#FF8A3D"/>
      <path d="M301 99c8 6 14 6 22 0" fill="none" stroke="#FFE5B7" stroke-width="3" stroke-linecap="round"/>
    </g>

    <!-- Category chips -->
    <g transform="translate(22 354)">
      <text x="0" y="16" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#152017">Shop quickly</text>
      <text x="268" y="16" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#159A52">View all</text>
      <g transform="translate(0 33)">
        <rect width="76" height="78" rx="22" fill="#EAF7EE"/>
        <circle cx="38" cy="28" r="15" fill="#35B86F"/>
        <path d="M30 30c8-14 17-12 22-5-5 10-13 12-22 8 6-1 10-4 14-9-6 2-10 5-14 6Z" fill="#FFFFFF"/>
        <text x="20" y="63" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#1E3527">Fruits</text>
      </g>
      <g transform="translate(90 33)">
        <rect width="76" height="78" rx="22" fill="#FFF3DA"/>
        <circle cx="38" cy="28" r="15" fill="#F5A623"/>
        <path d="M30 30h16c8 0 12 4 12 10H42c-8 0-12-4-12-10Z" fill="#FFFFFF"/>
        <text x="10" y="63" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#45321A">Groceries</text>
      </g>
      <g transform="translate(180 33)">
        <rect width="76" height="78" rx="22" fill="#EAF2FF"/>
        <rect x="25" y="14" width="26" height="31" rx="7" fill="#5A8DEE"/>
        <path d="M29 14h18v-5H29zM32 26h12" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="23" y="63" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#233857">Dairy</text>
      </g>
      <g transform="translate(270 33)">
        <rect width="76" height="78" rx="22" fill="#FFEDEA"/>
        <path d="M26 19h24l6 26H20z" fill="#EF5948"/>
        <path d="M28 24h20M31 31h16" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
        <text x="20" y="63" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="800" fill="#4A2924">Snacks</text>
      </g>
    </g>

    <!-- Featured rail -->
    <g transform="translate(22 492)">
      <text x="0" y="0" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#152017">Chef's picks</text>
      <text x="282" y="0" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#159A52">See all</text>

      <g transform="translate(0 18)" filter="url(#softShadow)">
        <rect width="156" height="196" rx="22" fill="#FFFFFF"/>
        <rect x="12" y="12" width="132" height="92" rx="18" fill="#F3FAED"/>
        <circle cx="78" cy="58" r="32" fill="#D93633"/>
        <path d="M64 31c12-12 25-10 36-2-15 2-26 7-36 2Z" fill="#258D4D"/>
        <rect x="18" y="112" width="48" height="20" rx="10" fill="#EAF7EE"/>
        <text x="30" y="126" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" fill="#159A52">4.8</text>
        <text x="18" y="151" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#17231B">Fresh Red Apple</text>
        <text x="18" y="171" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#7A8378">500g</text>
        <text x="18" y="190" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" fill="#159A52">Rs 89</text>
        <circle cx="132" cy="176" r="17" fill="#152017"/>
        <path d="M125 176h14M132 169v14" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
      </g>

      <g transform="translate(176 18)" filter="url(#softShadow)">
        <rect width="156" height="196" rx="22" fill="#FFFFFF"/>
        <rect x="12" y="12" width="132" height="92" rx="18" fill="#FFF7DF"/>
        <path d="M55 78c4-30 27-50 49-50 0 32-21 54-49 50Z" fill="#F7C246"/>
        <path d="M66 31c12-9 27-9 37 2-14 1-25 4-37-2Z" fill="#4DAD62"/>
        <rect x="18" y="112" width="48" height="20" rx="10" fill="#EAF7EE"/>
        <text x="30" y="126" font-family="Inter, Arial, sans-serif" font-size="10" font-weight="800" fill="#159A52">4.7</text>
        <text x="18" y="151" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900" fill="#17231B">Organic Bananas</text>
        <text x="18" y="171" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="600" fill="#7A8378">1 kg</text>
        <text x="18" y="190" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900" fill="#159A52">Rs 49</text>
        <circle cx="132" cy="176" r="17" fill="#152017"/>
        <path d="M125 176h14M132 169v14" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
      </g>
    </g>

    <!-- Promo strip -->
    <g transform="translate(22 735)">
      <rect width="346" height="54" rx="18" fill="#17231B"/>
      <circle cx="34" cy="27" r="16" fill="#F6B84B"/>
      <path d="M26 27h16M34 19v16" stroke="#17231B" stroke-width="2.4" stroke-linecap="round"/>
      <text x="62" y="24" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="900" fill="#FFFFFF">Free delivery over Rs 199</text>
      <text x="62" y="41" font-family="Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#CBD5CB">Fresh cart ETA updates before checkout</text>
    </g>

    <!-- Bottom nav -->
    <g transform="translate(0 802)">
      <rect width="390" height="42" fill="#FFFFFF"/>
      <rect x="132" y="8" width="126" height="5" rx="2.5" fill="#152017" opacity="0.88"/>
      <g transform="translate(44 -22)">
        <circle cx="0" cy="0" r="20" fill="#159A52"/>
        <path d="M-8 1h16M0-7v16" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"/>
      </g>
      <path d="M117 778h22v22h-22zM121 785h14M121 792h14" stroke="#A3ACA1" stroke-width="2" fill="none" stroke-linecap="round"/>
      <path d="M196 778c-6 0-11 5-11 11s5 11 11 11 11-5 11-11-5-11-11-11Z" stroke="#A3ACA1" stroke-width="2" fill="none"/>
      <path d="M273 798v-15h20v15M277 787l6-7 6 7" stroke="#A3ACA1" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
